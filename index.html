<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>results-summary-component</title>
	<link rel="stylesheet" href="./css/normalize.css">
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>
	<div class="results-summary-component">
		<div class="your-result">
			<div class="your-result-thema">
				<h1>your resukt</h1>
			</div>
			<div class="your-result-circle">
				<h2>76</h2>
				<span>of 100</span>
			</div>
			<div class="your-result-info">
				<h1>great </h1>
				<p>Your scored higher that 65% of the people who have taken these tests. </p>
			</div>
		</div>
		<div class="summary">
			<div class="summary-thema">
				<h1>summary</h1>
			</div>
			<div class="summary-card">
				<ul>
					<li class="reaction">
						<img src="./icons/icon-reaction.svg" alt="reaction">
						<h2>reaction</h2>
						<p>80/</p>
						<span>100</span>
					</li>
					<li class="memory">
						<img src="./icons/icon-memory.svg" alt="memory">
						<h2>memory</h2>
						<p>92/</p>
						<span>100</span>
					</li>
					<li class="verbal">
						<img src="./icons/icon-verbal.svg" alt="verbal">
						<h2>verbal</h2>
						<p>61/</p>
						<span>100</span>
					</li>
					<li class="visual">
						<img src="./icons/icon-visual.svg" alt="visual">
						<h2>visual</h2>
						<p>72/</p>
						<span>100</span>
					</li>
				</ul>
			</div>
			<div class="btn">
				<button>continiue</button>
			</div>
		</div>
	</div>

</body>

</html>
